{% extends "base.html" %}
{% block title %}Server Error{% endblock %}
{% block page_title %}500{% endblock %}
{% block content %}
<div class="d-flex flex-column align-items-center justify-content-center" style="min-height:60vh; text-align:center;">
  <div class="display-1 fw-bold gradient-text">500</div>
  <h2 class="mt-3 mb-2">Internal Server Error</h2>
  <p class="text-muted mb-4">Something went wrong on our end. Please try again.</p>
  <a href="{{ url_for('dashboard.index') }}" class="btn btn-gradient">
    <i class="bi bi-house-fill me-2"></i>Back to Dashboard
  </a>
</div>
{% endblock %}
