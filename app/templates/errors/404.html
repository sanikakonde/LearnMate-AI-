{% extends "base.html" %}
{% block title %}Page Not Found{% endblock %}
{% block page_title %}404{% endblock %}
{% block content %}
<div class="d-flex flex-column align-items-center justify-content-center" style="min-height:60vh; text-align:center;">
  <div class="display-1 fw-bold gradient-text">404</div>
  <h2 class="mt-3 mb-2">Page Not Found</h2>
  <p class="text-muted mb-4">The page you're looking for doesn't exist or has been moved.</p>
  <a href="{{ url_for('dashboard.index') }}" class="btn btn-gradient">
    <i class="bi bi-house-fill me-2"></i>Back to Dashboard
  </a>
</div>
{% endblock %}
